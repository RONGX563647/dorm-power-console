name: Deploy to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVER_IP: 117.72.210.10
  SERVER_USER: root
  SERVER_PATH: /opt/dorm-power

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: dorm-power-console/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Setup Maven with Aliyun Mirror
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <mirrors>
              <mirror>
                <id>aliyun</id>
                <mirrorOf>central</mirrorOf>
                <name>Aliyun Maven Mirror</name>
                <url>https://maven.aliyun.com/repository/public</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Build Backend
        run: |
          cd backend
          mvn clean package -DskipTests -B -s ~/.m2/settings.xml
      
      - name: Build Frontend
        run: |
          cd dorm-power-console
          npm config set registry https://registry.npmmirror.com/
          npm ci
          npm run build
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts
      - name: Copy files to server
        run: |
          rsync -avz --delete \
            --compress-level=9 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='back_end' \
            --exclude='backend/src/test' \
            --exclude='doc' \
            --exclude='dorm-power-console/.next' \
            --exclude='dorm-power-console/*.md' \
            --exclude='dorm-power-console/package-lock.json' \
            --exclude='*.sh' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='target' \
            --exclude='.vscode' \
            --exclude='.trae' \
            --exclude='*.log' \
            --exclude='backup' \
            --exclude='postgres_data' \
            --exclude='mosquitto/data' \
            --exclude='mosquitto/log' \
            --exclude='.gitignore' \
            --exclude='.eslintrc.json' \
            --exclude='next-env.d.ts' \
            --include='backend/' \
            --include='backend/src/' \
            --include='backend/src/main/' \
            --include='backend/src/main/**' \
            --include='backend/src/main/resources/**' \
            --include='backend/pom.xml' \
            --include='backend/Dockerfile' \
            --include='backend/.env.example' \
            --include='backend/mosquitto/' \
            --include='backend/mosquitto/**' \
            --include='dorm-power-console/' \
            --include='dorm-power-console/src/' \
            --include='dorm-power-console/src/**' \
            --include='dorm-power-console/package.json' \
            --include='dorm-power-console/Dockerfile' \
            --include='dorm-power-console/next.config.ts' \
            --include='dorm-power-console/tsconfig.json' \
            --include='dorm-power-console/public/' \
            --include='dorm-power-console/public/**' \
            --include='docker-compose.yml' \
            --include='docker-compose.production.yml' \
            --include='nginx/' \
            --include='nginx/**' \
            --include='.env.production.example' \
            --include='.env.docker.example' \
            --exclude='*' \
            ./ \
            ${{ env.SERVER_USER }}@${{ env.SERVER_IP }}:${{ env.SERVER_PATH }}/
      - name: Create environment file on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << 'ENDSSH'
            cd /opt/dorm-power
            cp .env.production.example .env.production
            sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=${DB_PASSWORD}/" .env.production
            sed -i "s/JWT_SECRET=.*/JWT_SECRET=${JWT_SECRET}/" .env.production
            sed -i "s/MQTT_PASSWORD=.*/MQTT_PASSWORD=${MQTT_PASSWORD}/" .env.production
          ENDSSH
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}

      - name: Configure DNS and Docker
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << 'ENDSSH'
            echo "=========================================="
            echo "  配置服务器DNS和Docker"
            echo "=========================================="
            
            # 配置系统DNS（临时）
            echo "nameserver 223.5.5.5" > /etc/resolv.conf
            echo "nameserver 223.6.6.6" >> /etc/resolv.conf
            echo "nameserver 8.8.8.8" >> /etc/resolv.conf
            
            # 创建 Docker 配置目录
            mkdir -p /etc/docker
            
            # 写入Docker配置（仅DNS，不使用镜像加速）
            cat > /etc/docker/daemon.json << 'EOF'
            {
              "dns": ["223.5.5.5", "223.6.6.6", "8.8.8.8", "8.8.4.4"],
              "log-driver": "json-file",
              "log-opts": {
                "max-size": "10m",
                "max-file": "3"
              }
            }
            EOF
            
            # 赋予正确权限
            chmod 644 /etc/docker/daemon.json
            
            # 重启 Docker 服务
            systemctl daemon-reload
            systemctl restart docker
            
            # 等待 Docker 完全启动
            echo "等待 Docker 启动..."
            sleep 15
            
            # 验证 Docker 状态
            systemctl status docker --no-pager
            
            # 验证DNS配置
            echo "验证Docker配置..."
            docker info | grep -A 3 "DNS" || echo "DNS配置未生效"
            
            echo "Docker配置完成！"
          ENDSSH
      - name: Check local Docker images
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << 'ENDSSH'
            set -e
            cd /opt/dorm-power
            
            echo "=========================================="
            echo "  检查本地Docker镜像"
            echo "=========================================="
            
            # 检查必需的镜像
            check_image() {
              local image=$1
              if docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "^${image}$"; then
                echo "✅ 镜像 $image 已存在"
                return 0
              else
                echo "❌ 镜像 $image 不存在"
                return 1
              fi
            }
            
            missing_images=()
            
            echo "检查 PostgreSQL 镜像..."
            check_image "postgres:16-alpine" || missing_images+=("postgres:16-alpine")
            
            echo "检查 Mosquitto 镜像..."
            check_image "eclipse-mosquitto:2" || missing_images+=("eclipse-mosquitto:2")
            
            echo "检查 Nginx 镜像..."
            check_image "nginx:alpine" || missing_images+=("nginx:alpine")
            
            if [ ${#missing_images[@]} -gt 0 ]; then
              echo ""
              echo "=========================================="
              echo "  ⚠️  缺少以下镜像，请手动拉取："
              echo "=========================================="
              for img in "${missing_images[@]}"; do
                echo "  docker pull $img"
              done
              echo ""
              echo "或者执行以下命令一次性拉取所有镜像："
              echo "  docker pull postgres:16-alpine"
              echo "  docker pull eclipse-mosquitto:2"
              echo "  docker pull nginx:alpine"
              echo "=========================================="
              exit 1
            fi
            
            echo ""
            echo "=========================================="
            echo "  ✅ 所有镜像已就绪！"
            echo "=========================================="
            
            # 显示本地镜像
            docker images | grep -E "postgres|mosquitto|nginx"
          ENDSSH
      - name: Fix mosquitto permissions
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << 'ENDSSH'
            echo "=========================================="
            echo "  修复Mosquitto配置和权限"
            echo "=========================================="
            
            cd /opt/dorm-power
            
            # 创建mosquitto目录（如果不存在）
            mkdir -p ./backend/mosquitto/config
            mkdir -p ./backend/mosquitto/data
            mkdir -p ./backend/mosquitto/log
            
            # 修复权限
            chmod -R 777 ./backend/mosquitto
            
            # 验证配置文件
            if [ -f ./backend/mosquitto/config/mosquitto.conf ]; then
              echo "✅ Mosquitto配置文件已存在"
              cat ./backend/mosquitto/config/mosquitto.conf
            else
              echo "⚠️  Mosquitto配置文件不存在，创建默认配置"
              cat > ./backend/mosquitto/config/mosquitto.conf << 'EOF'
          listener 1883
          allow_anonymous true
          persistence true
          persistence_location /mosquitto/data/
          log_dest file /mosquitto/log/mosquitto.log
          log_type all
          EOF
            fi
            
            echo "Mosquitto配置完成！"
          ENDSSH
      - name: Check SSL certificates
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << 'ENDSSH'
            echo "=========================================="
            echo "  检查SSL证书"
            echo "=========================================="
            
            # 检查证书文件是否存在
            if [ -f /etc/letsencrypt/live/dorm.rongx.top/fullchain.pem ] && [ -f /etc/letsencrypt/live/dorm.rongx.top/privkey.pem ]; then
              echo "✅ SSL证书已存在"
              ls -la /etc/letsencrypt/live/dorm.rongx.top/
            else
              echo "⚠️  SSL证书不存在，Nginx将使用HTTP模式"
            fi
          ENDSSH
      - name: Deploy with Docker
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << 'ENDSSH'
            set -e
            cd /opt/dorm-power

            echo "=========================================="
            echo "  开始部署 - 适配京东云（无CPU限制）"
            echo "=========================================="

            echo "1. 清理系统资源..."
            docker system prune -f || true

            echo "2. 停止旧服务并清理数据..."
            docker compose -f docker-compose.production.yml --env-file .env.production down --remove-orphans --volumes || true
            sleep 5

            # 删除数据库卷（强制重新初始化）
            docker volume rm dorm-power_postgres_data 2>/dev/null || true
            echo "✅ 已清理旧数据库数据"

            echo "3. 检查镜像状态..."
            docker images | grep -E "postgres|mosquitto|nginx|dorm-power" || echo "部分镜像不存在"

            echo "4. 分步启动服务..."

            echo "  4.1 启动数据库和MQTT..."
            docker compose -f docker-compose.production.yml --env-file .env.production up -d postgres mosquitto || {
              echo "错误: 数据库或MQTT启动失败"
              docker compose -f docker-compose.production.yml --env-file .env.production logs postgres mosquitto
              exit 1
            }

            echo "  4.2 等待数据库完全启动..."
            for i in {1..30}; do
              if docker exec dorm-power-postgres pg_isready -U postgres; then
                echo "✅ 数据库已就绪"
                break
              fi
              echo "等待数据库启动... (\$i/30)"
              sleep 2
            done

            echo "  4.3 验证数据库连接..."
            if docker exec dorm-power-postgres psql -U postgres -d dorm_power -c "SELECT 1;" > /dev/null 2>&1; then
              echo "✅ 数据库连接验证成功"
            else
              echo "❌ 错误: 数据库连接验证失败"
              echo "检查数据库..."
              docker exec dorm-power-postgres psql -U postgres -c "\l"
              exit 1
            fi

            echo "  4.4 启动后端服务..."
            # 清理旧的后端容器（避免名称冲突）
            docker stop dorm-power-backend 2>/dev/null || true
            docker rm dorm-power-backend 2>/dev/null || true
            docker compose -f docker-compose.production.yml --env-file .env.production up -d --build backend || {
              echo "错误: 后端服务启动失败"
              docker compose -f docker-compose.production.yml --env-file .env.production logs backend
              exit 1
            }
            sleep 20

            echo "  4.5 启动前端服务..."
            # 清理旧的前端容器（避免名称冲突）
            docker stop dorm-power-frontend 2>/dev/null || true
            docker rm dorm-power-frontend 2>/dev/null || true
            docker compose -f docker-compose.production.yml --env-file .env.production up -d --build frontend || {
              echo "错误: 前端服务启动失败"
              docker compose -f docker-compose.production.yml --env-file .env.production logs frontend
              exit 1
            }

            echo "  4.6 启动Nginx..."
            # 停止并删除旧的Nginx容器
            docker stop dorm-power-nginx 2>/dev/null || true
            docker rm dorm-power-nginx 2>/dev/null || true
            sleep 2

            # 启动新的Nginx容器
            docker compose -f docker-compose.production.yml --env-file .env.production up -d nginx || {
              echo "警告: Nginx启动失败，检查日志..."
              docker logs dorm-power-nginx 2>&1 || true
            }

            echo "5. 等待服务稳定..."
            sleep 10

            echo "6. 检查容器状态..."
            docker ps

            echo "=========================================="
            echo "  部署完成！"
            echo "=========================================="
          ENDSSH
      - name: Health check
        run: |
          echo "等待服务启动..."
          sleep 30

          echo "开始健康检查..."
          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "尝试 $((RETRY_COUNT + 1))/$MAX_RETRIES..."

            # 检查Nginx健康端点（通过Nginx访问）
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://${{ env.SERVER_IP }}:80/actuator/health 2>&1) || response="000"

            # 接受200
            if [ "$response" = "200" ]; then
              echo "✅ 健康检查通过！响应码: $response"
              echo "前端: http://${{ env.SERVER_IP }}:80"
              echo "后端: http://${{ env.SERVER_IP }}:8000"
              echo "Nginx: http://${{ env.SERVER_IP }}:80"
              exit 0
            else
              echo "响应码: $response"
              RETRY_COUNT=$((RETRY_COUNT + 1))

              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "等待 10 秒后重试..."
                  sleep 10
              fi
            fi
          done

          echo "❌ 健康检查失败！"
          echo "检查服务状态..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} \
            "docker ps -a && docker compose -f /opt/dorm-power/docker-compose.production.yml --env-file .env.production logs --tail=50"
          exit 1
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "Frontend: http://${{ env.SERVER_IP }}:3000"
            echo "Backend: http://${{ env.SERVER_IP }}:8000"
          elif [ "${{ job.status }}" == "cancelled" ]; then
            echo "⚠️  Deployment cancelled!"
            echo "The deployment was manually cancelled."
          else
            echo "❌ Deployment failed!"
            exit 1
          fi