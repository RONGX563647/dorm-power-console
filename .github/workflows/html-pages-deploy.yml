name: Deploy HTML Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/learn/*.md'
      - 'docs/learn/convert_to_html.py'
      - 'docs/learn/generate_index.py'
      - '.github/workflows/html-pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "html-docs-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/learn
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown pymdown-extensions

      - name: Convert Markdown to HTML
        run: |
          echo "转换 Markdown 为 HTML..."
          python convert_to_html.py
          python generate_index.py
          echo "✅ HTML 生成完成"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html_docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
