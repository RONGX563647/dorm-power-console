# 测试环境配置
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false
  cache:
    type: simple
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# 禁用 Kafka
kafka:
  enabled: false

# 禁用 MQTT
mqtt:
  enabled: false

# JWT 配置
security:
  jwt:
    secret: test-secret-key-for-testing-must-be-at-least-256-bits-long
    expiration: 86400000

# 限流配置 - 测试环境大幅放宽
rate-limit:
  login:
    max-requests: 100
    window-ms: 60000
  api:
    max-requests: 1000
    window-ms: 60000

# 日志配置
logging:
  level:
    root: warn
    com.dormpower: info

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true