# ========== 核心：修复Actuator 500错误 ==========
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
    enabled-by-default: true
  endpoint:
    health:
      show-details: always
      enabled: true
      security:
        enabled: false
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# ========== Spring配置 ==========
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dorm_power}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  # ========== Redis 配置 ==========
  # 针对 2核2GB 小型服务器优化连接池配置
  # Lettuce 基于 Netty NIO，单连接可多线程共享
  # 连接池主要用于阻塞命令和故障切换
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8    # 降低最大连接数（原20），适合小型服务器
          max-idle: 4      # 降低最大空闲连接（原10）
          min-idle: 2      # 降低最小空闲连接（原5），减少资源占用
          max-wait: -1ms
      # ========== 哨兵模式配置（可选）==========
      # sentinel:
      #   master: ${REDIS_SENTINEL_MASTER:mymaster}
      #   nodes: ${REDIS_SENTINEL_NODES:}
      # ========== 集群模式配置（可选）==========
      # cluster:
      #   nodes: ${REDIS_CLUSTER_NODES:}
      #   max-redirects: 3

# ========== Redis 增强配置 ==========
redis:
  # 熔断器配置
  circuit-breaker:
    failure-rate-threshold: 50           # 失败率50%触发熔断
    slow-call-rate-threshold: 80         # 慢调用率80%触发熔断
    slow-call-duration-threshold: 500ms  # 慢调用阈值
    wait-duration-in-open-state: 30s     # 熔断持续30秒
    sliding-window-size: 10              # 滑动窗口大小

  # 慢查询监控
  monitor:
    slow-query-threshold-ms: 100      # 慢查询阈值（毫秒）
    report-interval-ms: 60000         # 统计报告间隔（毫秒）

  # 热点 Key 检测
  hotkey:
    threshold-qps: 100                # 热点阈值（QPS）
    window-size-ms: 1000              # 滑动窗口大小
    local-cache-seconds: 60           # 热点 Key 本地缓存时间
    alert-threshold: 3                # 连续检测次数阈值
    detect-interval-ms: 1000          # 检测间隔

  # 容量治理
  capacity:
    memory-warning-percent: 80        # 内存预警阈值
    memory-critical-percent: 90       # 内存告警阈值
    check-interval-ms: 60000          # 检查间隔

  # ========== Kafka 配置 ==========
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      batch-size: 16384
      buffer-memory: 33554432
      acks: all
      retries: 3
    consumer:
      group-id: dorm-power-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 100
      enable-auto-commit: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  security:
    user:
      name: ""
      password: ""
    web:
      ignoring:
        - /actuator/**
        - /actuator/health
        - /actuator/info
    autoconfigure:
      exclude:
        - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
        - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

server:
  port: ${SERVER_PORT:8000}

mqtt:
  enabled: ${MQTT_ENABLED:true}
  broker-url: ${MQTT_BROKER_URL}
  client-id: ${MQTT_CLIENT_ID:dorm-power-backend}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: warn
    com.dormpower: info
