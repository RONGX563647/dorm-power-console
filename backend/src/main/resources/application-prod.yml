# ========== 核心：修复Actuator 500错误 ==========
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
    enabled-by-default: true
  endpoint:
    health:
      show-details: always
      enabled: true
      security:
        enabled: false
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# ========== Spring配置 ==========
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dorm_power}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  # ========== Redis 配置 ==========
  # 针对 2核2GB 小型服务器优化连接池配置
  # Lettuce 基于 Netty NIO，单连接可多线程共享
  # 连接池主要用于阻塞命令和故障切换
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8    # 降低最大连接数（原20），适合小型服务器
          max-idle: 4      # 降低最大空闲连接（原10）
          min-idle: 2      # 降低最小空闲连接（原5），减少资源占用
          max-wait: -1ms

  # ========== Kafka 配置 ==========
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      batch-size: 16384
      buffer-memory: 33554432
      acks: all
      retries: 3
    consumer:
      group-id: dorm-power-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 100
      enable-auto-commit: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  security:
    user:
      name: ""
      password: ""
    web:
      ignoring:
        - /actuator/**
        - /actuator/health
        - /actuator/info
    autoconfigure:
      exclude:
        - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
        - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

server:
  port: ${SERVER_PORT:8000}

mqtt:
  enabled: ${MQTT_ENABLED:true}
  broker-url: ${MQTT_BROKER_URL}
  client-id: ${MQTT_CLIENT_ID:dorm-power-backend}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: warn
    com.dormpower: info
