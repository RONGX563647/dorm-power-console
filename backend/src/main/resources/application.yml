spring:
  application:
    name: dorm-power-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/dorm_power
    username: rongx
    password:
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      idle-timeout: 60000
      pool-name: DormPowerHikariPool
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 120000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  validation:
    enabled: true
  config:
    import: optional:file:.env[.properties],optional:file:.env.production[.properties]
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8000}

mqtt:
  enabled: ${MQTT_ENABLED:true}
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:dorm-power-backend}
  username: ${MQTT_USERNAME:admin}
  password: ${MQTT_PASSWORD:admin}
  topic-prefix: ${MQTT_TOPIC_PREFIX:dorm}
  topics:
    device-status: status
    device-telemetry: telemetry
    device-command: cmd
    device-ack: ack
    device-event: event

security:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-jwt}
    expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: warn
    com.dormpower: info
    org.hibernate.SQL: off
    org.hibernate.type: off

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      enabled: true
    metrics:
      enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

# 备份配置
backup:
  path: ${BACKUP_PATH:./backups}

# Springdoc OpenAPI配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
