# Dorm Power Production Docker Compose
# 服务器配置: 2核2G (京东云轻量服务器)
# 服务器IP: 117.72.210.10
# 注意: 京东云轻量服务器内核不支持CPU限制，已移除所有cpus配置

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: dorm-power-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dorm_power}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - dorm-power-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: dorm-power-mosquitto
    volumes:
      - ./backend/mosquitto/config:/mosquitto/config:ro
      - ./backend/mosquitto/data:/mosquitto/data
      - ./backend/mosquitto/log:/mosquitto/log
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"
    mem_limit: 128M
    memswap_limit: 128M
    restart: unless-stopped
    networks:
      - dorm-power-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dorm-power-backend:latest
    container_name: dorm-power-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dorm_power}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      MQTT_ENABLED: "true"
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-dorm-power-backend}
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-dorm}
      SERVER_PORT: 8000
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-warn}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-info}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JAVA_OPTS: >
        -server
        -Xms384m
        -Xmx512m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+UnlockExperimentalVMOptions
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=70.0
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.backgroundpreinitializer.ignore=true
        -Dspring.jmx.enabled=false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    networks:
      - dorm-power-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 前端服务
  frontend:
    build:
      context: ./dorm-power-console
      dockerfile: Dockerfile
    image: dorm-power-console:latest
    container_name: dorm-power-console
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_BASE_URL: http://dorm-power-backend:8000
      NEXT_PUBLIC_APP_NAME: Dorm Power Console
      NEXT_PUBLIC_APP_VERSION: 1.0.0
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dorm-power-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: dorm-power-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - dorm-power-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  nginx_logs:

networks:
  dorm-power-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
