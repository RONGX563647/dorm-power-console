# Docker Compose配置文件
# 定义了后端应用和数据库服务及其依赖关系

services:
  # PostgreSQL数据库服务
  db:
    image: postgres:16              # 使用PostgreSQL 16镜像
    container_name: dorm-backend-db   # 容器名称
    restart: unless-stopped           # 重启策略：除非手动停止否则自动重启
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dorm_power}            # 数据库名称
      POSTGRES_USER: ${POSTGRES_USER:-dorm_user}        # 数据库用户名
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}  # 数据库密码
      TZ: Asia/Shanghai                                # 时区设置
    volumes:
      - pg_data:/var/lib/postgresql/data              # 数据持久化存储
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dorm_user} -d ${POSTGRES_DB:-dorm_power}"]  # 健康检查命令
      interval: 10s                                  # 检查间隔
      timeout: 5s                                   # 超时时间
      retries: 8                                     # 重试次数

  # 后端应用服务
  backend:
    build:
      context: .           # 构建上下文
      dockerfile: Dockerfile  # 使用的Dockerfile
    image: dorm-backend:latest    # 构建后的镜像名称
    container_name: dorm-backend   # 容器名称
    restart: unless-stopped         # 重启策略
    depends_on:
      db:
        condition: service_healthy  # 依赖数据库服务健康后才启动
    ports:
      - "8000:8000"            # 端口映射：主机8000到容器8000
    environment:
      # 后端服务配置
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      # 数据库连接URL
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-dorm_user}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-dorm_power}
      # MQTT配置
      MQTT_ENABLED: ${MQTT_ENABLED:-1}
      MQTT_HOST: ${MQTT_HOST:-175.27.162.174}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-dorm}
      # 管理员账户配置
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@dorm.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_admin_password}
      # 超时配置
      CMD_TIMEOUT_SECONDS: ${CMD_TIMEOUT_SECONDS:-30}
      ONLINE_TIMEOUT_SECONDS: ${ONLINE_TIMEOUT_SECONDS:-60}
      TZ: Asia/Shanghai

volumes:
  pg_data:

