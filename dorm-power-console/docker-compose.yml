services:
  dorm-power-console:
    build:
      context: .
      dockerfile: Dockerfile
    image: dorm-power-console:latest
    container_name: dorm-power-console
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: Asia/Shanghai
      BACKEND_BASE_URL: "http://175.27.162.174:8000"
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
